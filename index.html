<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0a84ff">
<title>모아도니</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; min-height: 100%; }
:root {
  --bg: #f5f5f7;
  --surface: #ffffff;
  --surface-2: #ececef;
  --text: #1c1c1e;
  --text-2: #8b8b93;
  --text-3: #b8b8c0;
  --border: rgba(0,0,0,0.06);
  --border-2: rgba(0,0,0,0.1);
  --accent: #0a84ff;
  --hansol: #0a84ff;
  --spouse: #ff7a00;
  --joint: #8b8b93;
  --danger: #ff3b30;
  --success: #34c759;
  --purple: #5856d6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --surface: #1c1c1e;
    --surface-2: #2c2c2e;
    --text: #ffffff;
    --text-2: #98989f;
    --text-3: #545458;
    --border: rgba(255,255,255,0.08);
    --border-2: rgba(255,255,255,0.14);
    --hansol: #0a84ff;
    --spouse: #ff9500;
    --joint: #8e8e93;
  }
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: 'tnum';
}
.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 90px;
  position: relative;
}
.header {
  position: sticky;
  top: 0;
  background: var(--bg);
  padding: 16px 20px 10px;
  z-index: 10;
}
.header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header .sub { font-size: 12px; color: var(--text-2); margin-top: 2px; }

.tab { display: none; padding: 4px 20px 20px; }
.tab.active { display: block; }

.card {
  background: var(--surface);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 12px;
  border: 0.5px solid var(--border);
}
.card-title { font-size: 12px; color: var(--text-2); margin-bottom: 8px; font-weight: 500; }
.big-num { font-size: 26px; font-weight: 600; letter-spacing: -0.7px; }
.med-num { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.sub-num { font-size: 12px; color: var(--text-2); }

.bar { height: 6px; background: var(--surface-2); border-radius: 3px; overflow: hidden; }
.bar > div { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.bar.over > div { background: var(--danger); }
.bar.warn > div { background: #ff9500; }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: start; }
.cat-card { background: var(--surface); padding: 14px; border-radius: 12px; border: 0.5px solid var(--border); }
.cat-card .n { font-size: 12px; color: var(--text-2); margin-bottom: 4px; font-weight: 500; }
.cat-card .v { font-size: 16px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.3px; }
.cat-detail-btn {
  width: 100%; margin-top: 10px; padding: 7px 8px; background: var(--surface-2);
  border: none; border-radius: 8px; font-size: 11px; color: var(--text-2);
  font-family: inherit; cursor: pointer; font-weight: 500;
}
.cat-detail-btn:active { opacity: .65; }

.sheet-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 90;
}
.sheet-backdrop.show { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px; background: var(--surface);
  border-radius: 18px 18px 0 0;
  padding: 8px 20px calc(env(safe-area-inset-bottom, 0) + 24px);
  transition: transform .25s cubic-bezier(.32,.72,0,1); z-index: 95;
  max-height: 80vh; overflow-y: auto;
}
.sheet.show { transform: translateX(-50%) translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--text-3); border-radius: 2px; margin: 6px auto 14px; opacity: .4; }
.sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.3px; }
.sheet-sub { font-size: 12px; color: var(--text-2); margin-bottom: 14px; }

.sheet-item { padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.sheet-item:last-child { border-bottom: 0; }
.sheet-item-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; font-size: 13px; gap: 8px; }
.sheet-item-head .nm { font-weight: 500; }
.sheet-item-head .am { font-size: 12px; color: var(--text-2); white-space: nowrap; }
.sheet-item-head .am b { color: var(--text); font-weight: 600; }
.sheet-item-head .am .pct.over { color: var(--danger); font-weight: 600; }
.sheet-item-head .am .pct.warn { color: #ff9500; font-weight: 600; }
.sheet-item.clickable { cursor: pointer; }
.sheet-item.clickable:active { opacity: .65; }
.mini-stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.mini-stat {
  background: var(--surface-2); border-radius: 10px; padding: 10px; min-width: 0;
}
.mini-stat .l { font-size: 10px; color: var(--text-2); margin-bottom: 2px; }
.mini-stat .v { font-size: 13px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.month-nav { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.month-nav button {
  width: 36px; height: 36px; border: 0.5px solid var(--border-2); border-radius: 18px;
  background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; font-family: inherit;
}
.month-nav .month-label { flex: 1; text-align: center; font-size: 17px; font-weight: 700; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-head { text-align: center; color: var(--text-3); font-size: 10px; padding: 4px 0; }
.cal-day {
  min-height: 54px; border: 0.5px solid var(--border); border-radius: 10px; background: var(--surface);
  padding: 6px 5px; text-align: left; color: var(--text); font-family: inherit; cursor: pointer;
}
.cal-day.blank { visibility: hidden; }
.cal-day.today { border-color: var(--accent); }
.cal-day.selected { background: var(--accent); color: white; border-color: var(--accent); }
.cal-day .d { font-size: 12px; font-weight: 700; line-height: 1; }
.cal-day .sum { font-size: 10px; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-2); }
.cal-day.selected .sum { color: rgba(255,255,255,.86); }

.chart { width: 100%; height: auto; display: block; }
.chart-line { stroke: var(--accent); fill: none; }
.chart-dot { fill: var(--accent); }
.chart-label { fill: var(--accent); font-family: inherit; }
.stop-top { stop-color: var(--accent); stop-opacity: 0.22; }
.stop-bot { stop-color: var(--accent); stop-opacity: 0; }
.chart-axis { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--text-3); padding: 0 4px; }

.tx-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 0.5px solid var(--border); gap: 10px; }
.tx-row:last-child { border-bottom: 0; }
.tx-left { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.tx-m { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tx-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.tx-a { font-size: 15px; font-weight: 600; white-space: nowrap; }
.tx-a.expense { color: var(--text); }
.tx-a.income { color: var(--success); }
.tx-a.invest { color: var(--accent); }

.tabbar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding: 6px 0 calc(env(safe-area-inset-bottom, 0) + 6px);
  z-index: 50;
}
.tabbar button {
  flex: 1;
  background: none;
  border: none;
  padding: 6px 2px;
  color: var(--text-3);
  font-size: 10px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
}
.tabbar button .ic { display: block; font-size: 20px; margin-bottom: 2px; line-height: 1; }
.tabbar button.active { color: var(--accent); }

.toggle-group { display: flex; background: var(--surface-2); padding: 3px; border-radius: 10px; margin-bottom: 18px; }
.toggle-group button {
  flex: 1; padding: 9px; border: none; background: transparent; border-radius: 8px;
  font-size: 13px; font-weight: 500; color: var(--text-2); cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.toggle-group button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.08); font-weight: 600; }

.amount-input {
  width: 100%; border: none; background: transparent; font-size: 34px; font-weight: 700;
  font-family: inherit; color: var(--text); text-align: right; padding: 14px 0; outline: none;
  letter-spacing: -1px; -webkit-appearance: none;
}

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
.field input[type=text], .field input[type=date] {
  width: 100%; padding: 12px 14px; border: 0.5px solid var(--border-2); border-radius: 10px;
  background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; outline: none;
  -webkit-appearance: none;
}
.field input:focus { border-color: var(--accent); }

.chip-group { margin-bottom: 8px; }
.chip-group .gn { font-size: 11px; color: var(--text-3); margin-bottom: 6px; font-weight: 500; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 7px 12px; background: var(--surface); border: 0.5px solid var(--border-2);
  border-radius: 16px; font-size: 12px; color: var(--text-2); cursor: pointer; font-family: inherit;
  transition: all .12s;
}
.chip.active { background: var(--accent); color: white; border-color: var(--accent); }
.chip.chip-add { border-style: dashed; color: var(--accent); border-color: var(--accent); background: transparent; }

.payer-row { display: flex; gap: 6px; }
.payer-row button {
  flex: 1; padding: 12px; border: 0.5px solid var(--border-2); background: var(--surface);
  border-radius: 10px; font-size: 13px; color: var(--text-2); cursor: pointer; font-family: inherit;
  font-weight: 500; transition: all .12s;
}
.payer-row button.active { background: var(--accent); color: white; border-color: var(--accent); }
.asset-edit-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 4px; }
.asset-edit-grid.one { grid-template-columns: 1fr; }
.asset-edit-grid label { font-size: 11px; color: var(--text-2); display: flex; flex-direction: column; gap: 4px; }
.asset-edit-grid input { width: 100%; padding: 9px 10px; border: 0.5px solid var(--border-2); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 14px; font-family: inherit; outline: none; text-align: right; }
.asset-edit-grid input:focus { border-color: var(--accent); }
.payer-row button.active.hansol { background: var(--hansol); color: white; border-color: var(--hansol); }
.payer-row button.active.spouse { background: var(--spouse); color: white; border-color: var(--spouse); }
.payer-row button.active.joint { background: var(--joint); color: white; border-color: var(--joint); }

.btn-primary {
  width: 100%; padding: 15px; background: var(--accent); color: white;
  border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
  font-family: inherit; margin-top: 6px;
}
.btn-primary:active { opacity: .8; }

.budget-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 0.5px solid var(--border); gap: 12px; }
.budget-row:last-child { border-bottom: 0; }
.budget-row .n { font-size: 14px; flex: 1; }
.budget-row .spent { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.budget-row input {
  width: 120px; text-align: right; padding: 8px 12px; border: 0.5px solid var(--border-2);
  border-radius: 8px; background: var(--surface); color: var(--text); font-family: inherit;
  font-size: 13px; outline: none; -webkit-appearance: none; font-weight: 500;
}
.budget-row input:focus { border-color: var(--accent); }
.group-title { font-size: 12px; color: var(--text-2); margin: 18px 4px 6px; font-weight: 500; }

.matrix { width: 100%; border-collapse: collapse; font-size: 13px; }
.matrix th, .matrix td { padding: 10px 4px; text-align: right; border-bottom: 0.5px solid var(--border); }
.matrix th { font-weight: 500; color: var(--text-2); font-size: 11px; }
.matrix td:first-child, .matrix th:first-child { text-align: left; font-weight: 500; }
.matrix .total td { font-weight: 700; border-bottom: 0; padding-top: 12px; }
.matrix .debt td { color: var(--danger); }
.matrix .hansol-col { color: var(--hansol); }
.matrix .spouse-col { color: var(--spouse); }
.matrix tr.total { border-top: 0.5px solid var(--border-2); }

.alloc-row { padding: 12px 0; border-bottom: 0.5px solid var(--border); }
.alloc-row:last-child { border-bottom: 0; }
.alloc-head { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; align-items: baseline; }
.alloc-bar { height: 8px; background: var(--surface-2); border-radius: 4px; position: relative; overflow: hidden; }
.alloc-bar > div { height: 100%; border-radius: 4px; transition: width .3s; }
.alloc-meta { font-size: 11px; color: var(--text-2); margin-top: 5px; display: flex; justify-content: space-between; }

.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: var(--bg); padding: 11px 22px; border-radius: 24px;
  font-size: 13px; font-weight: 500; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.kv-row { display: flex; justify-content: space-between; padding: 9px 0; font-size: 13px; align-items: baseline; }
.kv-row .k { color: var(--text-2); }
.kv-row .v { font-weight: 600; }
.bullet { padding: 7px 0 7px 16px; position: relative; font-size: 13px; line-height: 1.5; }
.bullet:before { content: '•'; position: absolute; left: 2px; color: var(--text-3); }

.who-pill { display: flex; gap: 8px; margin-top: 12px; }
.who-pill > div { flex: 1; padding: 10px; background: var(--surface-2); border-radius: 10px; text-align: center; }
.who-pill .l { font-size: 11px; color: var(--text-2); margin-bottom: 2px; }
.who-pill .v { font-weight: 600; font-size: 14px; }

.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: 1px; }
.dot.h { background: var(--hansol); }
.dot.s { background: var(--spouse); }
.dot.j { background: var(--joint); }

.empty { text-align: center; padding: 24px 12px; color: var(--text-3); font-size: 13px; }

.tip {
  background: var(--surface-2); border-radius: 12px; padding: 14px 16px; font-size: 13px;
  line-height: 1.55; color: var(--text); margin-bottom: 12px;
}
.tip b { color: var(--accent); }

.reset-link {
  display: block; text-align: center; padding: 20px; background: none; border: none;
  color: var(--text-3); font-size: 11px; cursor: pointer; font-family: inherit; width: 100%;
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <h1 id="header-title">홈</h1>
    <div class="sub" id="header-sub"></div>
  </header>
  <main>
    <section id="tab-home" class="tab active"></section>
    <section id="tab-input" class="tab"></section>
    <section id="tab-ledger" class="tab"></section>
    <section id="tab-calendar" class="tab"></section>
    <section id="tab-budget" class="tab"></section>
    <section id="tab-report" class="tab"></section>
    <section id="tab-asset" class="tab"></section>
  </main>
  <nav class="tabbar">
    <button data-tab="home" class="active"><span class="ic">🏠</span>홈</button>
    <button data-tab="input"><span class="ic">＋</span>입력</button>
    <button data-tab="ledger"><span class="ic">🧾</span>내역</button>
    <button data-tab="calendar"><span class="ic">📅</span>달력</button>
    <button data-tab="report"><span class="ic">📋</span>결산</button>
    <button data-tab="asset"><span class="ic">💎</span>자산</button>
  </nav>
  <div class="toast" id="toast"></div>
  <div class="sheet-backdrop" id="sheet-backdrop"></div>
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-title"></div>
    <div class="sheet-sub" id="sheet-sub"></div>
    <div id="sheet-body"></div>
  </div>
</div>

<!-- 로그인 / 로딩 오버레이 -->
<div id="auth-overlay" style="position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;">
  <div style="font-size:40px;margin-bottom:8px;">🪙</div>
  <div style="font-size:20px;font-weight:700;margin-bottom:4px;">모아도니</div>
  <div id="auth-sub" style="font-size:13px;color:var(--text-2);margin-bottom:24px;">불러오는 중…</div>
  <div id="auth-form" style="width:100%;max-width:320px;display:none;flex-direction:column;gap:12px;align-items:center;">
    <button type="button" id="auth-google"
      style="display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;border-radius:12px;border:0.5px solid var(--border);background:#fff;color:#1f1f1f;font-size:15px;font-weight:600;">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-4 6.8-9.9 6.8-17.4z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.3 0 11.6-2.1 15.5-5.7l-7.3-5.7c-2 1.4-4.7 2.3-8.2 2.3-6.3 0-11.7-3.7-13.6-9.3l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>
      Google로 로그인
    </button>
    <div id="auth-err" style="font-size:13px;color:var(--danger);min-height:18px;text-align:center;"></div>
  </div>

  <div id="onb-form" style="width:100%;max-width:320px;display:none;flex-direction:column;gap:18px;">
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="font-size:13px;font-weight:600;">새 가계부 만들기</div>
      <input id="onb-name" type="text" placeholder="가계부 이름 (예: 우리집)"
        style="padding:13px 14px;border-radius:12px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;">
      <button type="button" id="onb-create"
        style="padding:14px;border-radius:12px;border:0;background:var(--accent);color:#fff;font-size:15px;font-weight:600;">만들기</button>
    </div>
    <div style="height:0.5px;background:var(--border);"></div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div style="font-size:13px;font-weight:600;">초대코드로 참여</div>
      <input id="onb-code" type="text" placeholder="초대코드 입력" autocapitalize="characters"
        style="padding:13px 14px;border-radius:12px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:16px;text-transform:uppercase;">
      <button type="button" id="onb-join"
        style="padding:14px;border-radius:12px;border:0.5px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-weight:600;">참여하기</button>
    </div>
    <div id="onb-err" style="font-size:13px;color:var(--danger);min-height:18px;text-align:center;"></div>
    <button type="button" onclick="logout()" style="background:none;border:0;color:var(--text-2);font-size:12px;">다른 계정으로 로그인</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';

// 가계부 데이터 로드: 설정묶음(inc/bd/as/dt/hist) + 거래(행)
async function loadData() {
  const [{ data: ls }, { data: rows }] = await Promise.all([
    sb.from('ledger_settings').select('data').eq('household_id', HH).single(),
    sb.from('transactions').select('*').eq('household_id', HH)
      .order('d', { ascending: true }).order('created_at', { ascending: true })
  ]);
  const blob = (ls && ls.data) || {};
  S = clone(DEFAULTS);
  if (blob.inc != null) S.inc = blob.inc;
  if (blob.bd)   S.bd   = blob.bd;
  S.as = Object.assign(clone(DEFAULTS.as), blob.as || {});   // 새 자산종류(연금 등) 보강
  S.dt = normalizeDebt(blob.dt);
  if (blob.hist) S.hist = blob.hist;
  if (Object.keys(blob).length === 0) await pushSettings();   // 새 가계부면 기본 설정 한 번 저장
  S.tx = (rows || []).map(r => ({
    id: r.id, d: r.d, t: r.t, a: Number(r.a),
    m: r.m || '', c: r.c || '', p: r.author_label || ''
  }));
}

// 설정묶음 저장 (소득/예산/자산/부채/순자산) — 디바운스, 마지막 입력 이김
let saveTimer = null;
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushSettings, 500);
}
async function pushSettings() {
  clearTimeout(saveTimer);
  if (!HH) return;
  const data = { inc: S.inc, bd: S.bd, as: S.as, dt: S.dt, hist: S.hist };
  try {
    await sb.from('ledger_settings').update({ data, updated_at: new Date().toISOString() }).eq('household_id', HH);
  } catch (e) { console.warn('settings save error', e); }
}

// 거래 추가 — 행 단위 INSERT (동시 입력해도 atomic, 유실 없음)
async function addTransaction(tx) {
  const { data, error } = await sb.from('transactions').insert({
    household_id: HH, d: tx.d, t: tx.t, a: tx.a, m: tx.m, c: tx.c,
    author_user_id: ME && ME.id, author_label: tx.p
  }).select().single();
  if (error) { toast('저장 실패: ' + error.message); return false; }
  S.tx.push({ id: data.id, d: data.d, t: data.t, a: Number(data.a), m: data.m || '', c: data.c || '', p: data.author_label || '' });
  return true;
}

async function deleteTransaction(id) {
  const { error } = await sb.from('transactions').delete().eq('id', id);
  if (error) { toast('삭제 실패'); return false; }
  S.tx = S.tx.filter(t => t.id !== id);
  return true;
}

async function updateTransaction(id, tx) {
  const { data, error } = await sb.from('transactions').update({
    d: tx.d, t: tx.t, a: tx.a, m: tx.m, c: tx.c, author_label: tx.p, updated_at: new Date().toISOString()
  }).eq('id', id).select().single();
  if (error) { toast('수정 실패: ' + error.message); return false; }
  const mapped = { id, d: data.d, t: data.t, a: Number(data.a), m: data.m||'', c: data.c||'', p: data.author_label||'' };
  const i = S.tx.findIndex(x => x.id === id);
  if (i >= 0) S.tx[i] = mapped; else S.tx.push(mapped);
  return true;
}

function clone(o) { return JSON.parse(JSON.stringify(o)); }
function fmt(n) { return Math.round(n||0).toLocaleString('ko-KR'); }
function fmtMan(n) {
  if (n == null || n === 0) return '0';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 100000000) {
    const e = abs / 100000000;
    return sign + (e >= 10 ? e.toFixed(1) : e.toFixed(2)).replace(/\.?0+$/,'') + '억';
  }
  if (abs >= 10000) {
    return sign + Math.round(abs/10000).toLocaleString('ko-KR') + '만';
  }
  return sign + abs.toLocaleString('ko-KR');
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastT);
  window.__toastT = setTimeout(() => t.classList.remove('show'), 1500);
}

function spentByCat() {
  const map = {};
  S.bd.forEach(b => map[b.id] = 0);
  S.tx.forEach(t => {
    if (t.t === 'expense' && t.d.startsWith(MONTH) && map[t.c] !== undefined) {
      map[t.c] += t.a;
    }
  });
  return map;
}
function spentByGroup() {
  const sp = spentByCat();
  const spent = {고정:0, 변동:0, 비정기:0, 용돈:0};
  const budget = {고정:0, 변동:0, 비정기:0, 용돈:0};
  S.bd.forEach(b => {
    spent[b.g] += sp[b.id] || 0;
    budget[b.g] += b.a;
  });
  return {spent, budget};
}
function totalSpent() {
  return S.tx.filter(t => t.t === 'expense' && t.d.startsWith(MONTH))
    .reduce((s, t) => s + t.a, 0);
}
function totalIncome() {
  return S.tx.filter(t => t.t === 'income' && t.d.startsWith(MONTH))
    .reduce((s, t) => s + t.a, 0) || S.inc;
}
function totalBudget() {
  return S.bd.reduce((s, b) => s + b.a, 0);
}
function normalizeDebt(dt) {
  const out = { mortgage: 0, credit: {h:0,s:0,c:0}, minus: {h:0,s:0,c:0} };
  if (dt == null) return out;
  if (typeof dt === 'number') { out.mortgage = dt; return out; }   // 아주 옛 단일값
  out.mortgage = dt.mortgage || 0;
  ['credit','minus'].forEach(k => {
    const v = dt[k];
    if (typeof v === 'number') out[k] = {h:0, s:0, c:v};            // 옛 단일 → 공동
    else if (v && typeof v === 'object') out[k] = Object.assign({h:0,s:0,c:0}, v);
  });
  return out;
}
function debtSlot(slot) {   // 소유주별 부채 (신용+마이너스)
  return ((S.dt.credit && S.dt.credit[slot]) || 0) + ((S.dt.minus && S.dt.minus[slot]) || 0);
}
function totalDebt(inclMortgage) {   // 부동산(주담대) 제외 시 inclMortgage=false
  if (inclMortgage === undefined) inclMortgage = true;
  let t = debtSlot('h') + debtSlot('s') + debtSlot('c');
  if (inclMortgage) t += (S.dt.mortgage || 0);
  return t;
}
function assetTotal(inclRe) {
  let total = 0;
  Object.keys(S.as).forEach(k => {
    if (!inclRe && k === 're') return;
    const a = S.as[k]; total += (a.h||0) + (a.s||0) + (a.c||0);
  });
  return total;
}
function netWorth(inclRe) {
  if (inclRe === undefined) inclRe = true;
  return assetTotal(inclRe) - totalDebt(inclRe);   // 부동산 제외 시 주담대도 제외
}
// 현재 달 순자산 스냅샷을 hist에 기록(상향). 자산 편집 때 호출 → 추이 그래프 누적
function recordSnapshot() {
  if (!S.hist) S.hist = [];
  const entry = { m: MONTH, nw: netWorth(true), nwx: netWorth(false) };
  const i = S.hist.findIndex(h => h.m === MONTH);
  if (i >= 0) S.hist[i] = entry; else S.hist.push(entry);
}

    });

}

function openCatSheet(g) {
  const items = S.bd.filter(b => b.g === g);
  const sp = spentByCat();
  const dayNum = parseInt(TODAY.split('-')[2], 10);
  const dayPct = Math.round(dayNum / DAYS_IN_MONTH * 100);
  const totalS = items.reduce((s, b) => s + (sp[b.id] || 0), 0);
  const totalB = items.reduce((s, b) => s + b.a, 0);
  const totalPct = totalB ? Math.round(totalS / totalB * 100) : 0;

  const partnerDot = (b) => {
    if (b.g !== '용돈') return '';
    if (OWNER1 && b.n.includes(OWNER1)) return '<span class="dot h"></span>';
    if (OWNER2 && b.n.includes(OWNER2)) return '<span class="dot s"></span>';
    return '';
  };

  document.getElementById('sheet-title').textContent = g + ' 상세';
  document.getElementById('sheet-sub').textContent =
    `사용 ${fmt(totalS)}원 / 예산 ${fmt(totalB)}원 · ${totalPct}%`;

  const body = items.map(b => {
    const s = sp[b.id] || 0;
    const p = b.a ? Math.round(s / b.a * 100) : 0;
    const pCapped = Math.min(100, p);
    const over = s > b.a;
    const warn = !over && p > dayPct + 15;
    const pCls = over ? 'over' : warn ? 'warn' : '';
    const barCls = over ? 'over' : warn ? 'warn' : '';
    const remain = b.a - s;
    const remainText = remain >= 0 ? `잔여 ${fmt(remain)}원` : `초과 ${fmt(-remain)}원`;
    const count = S.tx.filter(t => t.t === 'expense' && t.c === b.id && t.d.startsWith(MONTH)).length;
    return `<div class="sheet-item clickable" data-cat-detail="${b.id}">
      <div class="sheet-item-head">
        <span class="nm">${partnerDot(b)}${b.n}</span>
        <span class="am"><b>${fmt(s)}</b> / ${fmt(b.a)}원 <span class="pct ${pCls}">· ${p}%</span></span>
      </div>
      <div class="bar ${barCls}"><div style="width:${pCapped}%"></div></div>
      <div class="sub-num" style="margin-top:5px;text-align:right;font-size:11px;">${remainText} · 거래 ${count}건 ›</div>
    </div>`;
  }).join('');

  document.getElementById('sheet-body').innerHTML = body;
  document.querySelectorAll('[data-cat-detail]').forEach(el => {
    el.addEventListener('click', () => openCategoryDetail(el.dataset.catDetail, MONTH));
  });
  document.getElementById('sheet').classList.add('show');
  document.getElementById('sheet-backdrop').classList.add('show');
}

function openCategoryDetail(catId, month) {
  month = month || MONTH;
  const b = S.bd.find(x => x.id === catId);
  if (!b) return;
  const rows = S.tx.filter(t => t.t === 'expense' && t.c === catId && t.d.startsWith(month)).sort(sortTxDesc);
  const total = rows.reduce((s, t) => s + t.a, 0);
  const pct = b.a ? Math.round(total / b.a * 100) : 0;
  document.getElementById('sheet-title').textContent = b.n;
  document.getElementById('sheet-sub').textContent = `${monthLabel(month)} · ${fmt(total)}원 / 예산 ${fmt(b.a)}원 · ${pct}%`;
  document.getElementById('sheet-body').innerHTML = rows.length
    ? rows.map(t => txRowHtml(t, { fullDate: true, fromSheet: true })).join('')
    : '<div class="empty">이 달의 거래가 없습니다</div>';
  document.getElementById('sheet').classList.add('show');
  document.getElementById('sheet-backdrop').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('show');
  document.getElementById('sheet-backdrop').classList.remove('show');
  rerenderCurrent();
}
document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);

let inputState = {id:null, t:'expense', a:0, m:'', c:'', p:'', d:TODAY};

// 지출 카테고리 추가 (입력 탭 칩에서 호출) — S.bd에 행 추가 후 자동 선택
async function addCategory(g) {
  const name = (prompt(`'${g}' 그룹에 추가할 카테고리 이름`) || '').trim();
  if (!name) return;
  if (S.bd.some(b => b.n === name && b.g === g)) { toast('이미 있는 카테고리예요'); return; }
  const id = 'c' + Date.now();
  S.bd.push({ id, n: name, g, a: 0 });
  await pushSettings();
  inputState.c = id;   // 새로 만든 카테고리 자동 선택
  toast('카테고리가 추가됐어요');
  renderInput();
}

function renderInput() {
  // 결제자 후보: 구성원 + 공동 (기본값 = 나)
  const payers = [];
  if (OWNER1) payers.push(OWNER1);
  if (OWNER2) payers.push(OWNER2);
  if (!payers.length) payers.push(myLabel());
  if (!inputState.p || !payers.includes(inputState.p)) inputState.p = myLabel();
  const payerBtns = payers.map(p =>
    `<button data-p="${p}" class="${inputState.p===p?'active':''}">${p}</button>`
  ).join('');

  // 타입별 카테고리 칩
  const chip = (id, n) => `<button class="chip ${inputState.c===id?'active':''}" data-cat="${id}">${n}</button>`;
  let chipSection;
  if (inputState.t === 'expense') {
    chipSection = ['고정','변동','비정기','용돈'].map(g => {
      const items = S.bd.filter(b => b.g === g).map(b => chip(b.id, b.n)).join('')
        + `<button type="button" class="chip chip-add" data-addg="${g}">＋ 추가</button>`;
      return `<div class="chip-group"><div class="gn">${g}</div><div class="chip-row">${items}</div></div>`;
    }).join('');
  } else {
    chipSection = `<div class="chip-row">${catsFor(inputState.t).map(c => chip(c.id, c.n)).join('')}</div>`;
  }

  // 타입별 라벨/예시
  const memo = inputState.t === 'income'
      ? {label:'출처 / 메모', ph:'예: 회사 월급, 배당 등'}
    : inputState.t === 'invest'
      ? {label:'내용 / 메모', ph:'예: S&P500 ETF 매수 등'}
      : {label:'결제처 / 메모', ph:'예: 커피, 마트 등'};

  document.getElementById('tab-input').innerHTML = `
    ${inputState.id ? '<div class="sub-num" style="text-align:center;margin-bottom:10px;color:var(--accent);font-weight:600;">✏️ 거래 수정 중</div>' : ''}
    <div class="toggle-group" id="type-toggle">
      <button data-type="expense" class="${inputState.t==='expense'?'active':''}">지출</button>
      <button data-type="income" class="${inputState.t==='income'?'active':''}">수입</button>
      <button data-type="invest" class="${inputState.t==='invest'?'active':''}">투자</button>
    </div>

    <div class="card">
      <div class="card-title">금액</div>
      <input type="text" class="amount-input" id="amt-input" placeholder="0" inputmode="numeric" value="${inputState.a?inputState.a.toLocaleString('ko-KR'):''}">
    </div>

    <div class="field">
      <label>날짜</label>
      <input type="date" id="date-input" value="${inputState.d || TODAY}">
    </div>

    <div class="field">
      <label>${memo.label}</label>
      <input type="text" id="merchant-input" placeholder="${memo.ph}" value="${inputState.m}">
    </div>

    <div class="field">
      <label>카테고리</label>
      ${chipSection}
    </div>

    <div class="field">
      <label>결제자</label>
      <div class="payer-row" id="payer-row">${payerBtns}</div>
    </div>

    <button class="btn-primary" id="save-tx">${inputState.id ? '수정 저장' : '저장'}</button>
    ${inputState.id ? `<button class="reset-link" id="del-tx" style="color:var(--danger);">이 거래 삭제</button>
    <button class="reset-link" id="cancel-edit">취소</button>` : ''}
  `;

  const amt = document.getElementById('amt-input');
  amt.addEventListener('input', e => {
    const raw = e.target.value.replace(/[^0-9]/g, '');
    inputState.a = parseInt(raw, 10) || 0;
    e.target.value = inputState.a ? inputState.a.toLocaleString('ko-KR') : '';
  });
  if (!inputState.id) setTimeout(() => amt.focus(), 50);

  document.getElementById('date-input').addEventListener('change', e => {
    inputState.d = e.target.value || TODAY;
  });

  document.getElementById('merchant-input').addEventListener('input', e => {
    inputState.m = e.target.value;
  });

  document.querySelectorAll('#type-toggle button').forEach(b => {
    b.addEventListener('click', () => {
      if (inputState.t === b.dataset.type) return;
      inputState.t = b.dataset.type;
      inputState.c = '';   // 타입마다 카테고리가 다르므로 초기화
      renderInput();       // 칩·라벨 다시 그림
    });
  });

  document.querySelectorAll('.chip:not(.chip-add)').forEach(c => {
    c.addEventListener('click', () => {
      inputState.c = c.dataset.cat;
      document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
    });
  });

  document.querySelectorAll('.chip-add').forEach(b => {
    b.addEventListener('click', () => addCategory(b.dataset.addg));
  });

  document.querySelectorAll('#payer-row button').forEach(b => {
    b.addEventListener('click', () => {
      inputState.p = b.dataset.p;
      document.querySelectorAll('#payer-row button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  document.getElementById('save-tx').addEventListener('click', async () => {
    if (!inputState.a) { toast('금액을 입력해주세요'); return; }
    if (!inputState.m.trim()) { toast('결제처를 입력해주세요'); return; }
    if (inputState.t === 'expense' && !inputState.c) { toast('카테고리를 선택해주세요'); return; }

    const btn = document.getElementById('save-tx');
    btn.disabled = true;
    const payload = {
      d: inputState.d || TODAY, t: inputState.t, a: inputState.a,
      m: inputState.m.trim(), c: inputState.c, p: inputState.p || myLabel()
    };
    const ok = inputState.id
      ? await updateTransaction(inputState.id, payload)
      : await addTransaction(payload);
    btn.disabled = false;
    if (!ok) return;
    toast(inputState.id ? '수정되었습니다' : '저장되었습니다');
    inputState = {id:null, t:'expense', a:0, m:'', c:'', p:'', d:TODAY};
    switchTab('home');
  });

  if (inputState.id) {
    document.getElementById('del-tx').addEventListener('click', async () => {
      if (!confirm('이 거래를 삭제할까요?')) return;
      if (!(await deleteTransaction(inputState.id))) return;
      toast('삭제되었습니다');
      inputState = {id:null, t:'expense', a:0, m:'', c:'', p:'', d:TODAY};
      switchTab('home');
    });
    document.getElementById('cancel-edit').addEventListener('click', () => {
      inputState = {id:null, t:'expense', a:0, m:'', c:'', p:'', d:TODAY};
      switchTab('home');
    });
  }
}

// ===== LEDGER (내역) =====
const DONUT_COLORS = ['#0a84ff','#ff9500','#34c759','#5856d6','#ff3b30','#5ac8fa','#af52de','#ffcc00','#ff2d55','#8e8e93'];

function renderDonut(items, total) {
  if (!total) {
    return `<div class="card"><div class="card-title">${MON}월 지출 비중</div><div class="empty">이번 달 지출이 없습니다</div></div>`;
  }
  const C = 2 * Math.PI * 52;   // 도넛 반지름 52
  let offset = 0;
  const segs = items.map((c, i) => {
    const len = c.a / total * C;
    const col = DONUT_COLORS[i % DONUT_COLORS.length];
    const seg = `<circle cx="80" cy="80" r="52" fill="none" stroke="${col}" stroke-width="22"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}"
      transform="rotate(-90 80 80)"/>`;
    offset += len;
    return seg;
  }).join('');

  const legend = items.map((c, i) => {
    const col = DONUT_COLORS[i % DONUT_COLORS.length];
    const pct = (c.a / total * 100).toFixed(0);
    const clickAttr = c.id ? ` data-ledger-cat="${c.id}"` : '';
    const cursor = c.id ? 'cursor:pointer;' : '';
    return `<div${clickAttr} style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;gap:8px;${cursor}">
      <span style="display:flex;align-items:center;gap:7px;min-width:0;">
        <span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${col};flex-shrink:0;"></span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.n}</span>
      </span>
      <span style="white-space:nowrap;color:var(--text-2);"><b style="color:var(--text);">${fmt(c.a)}</b>원 · ${pct}%</span>
    </div>`;
  }).join('');

  return `<div class="card">
    <div class="card-title">${MON}월 지출 비중</div>
    <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
      <svg viewBox="0 0 160 160" style="width:140px;height:140px;flex-shrink:0;margin:0 auto;">
        ${segs}
        <text x="80" y="74" text-anchor="middle" font-size="11" fill="var(--text-2)">월 지출</text>
        <text x="80" y="93" text-anchor="middle" font-size="15" font-weight="700" fill="var(--text)">${fmtMan(total)}</text>
      </svg>
      <div style="flex:1;min-width:170px;">${legend}</div>
    </div>
  </div>`;
}

function renderLedger() {
  // 이번 달 지출 카테고리별 집계 (큰 순)
  const sp = spentByCat();
  let cats = S.bd.map(b => ({ id: b.id, n: b.n, a: sp[b.id] || 0 }))
    .filter(c => c.a > 0)
    .sort((a, b) => b.a - a.a);
  const total = cats.reduce((s, c) => s + c.a, 0);
  // 항목이 많으면 상위 7개 + 기타로 묶기
  if (cats.length > 8) {
    const rest = cats.slice(7).reduce((s, c) => s + c.a, 0);
    cats = [...cats.slice(0, 7), { id: '', n: '기타', a: rest }];
  }

  // 전체 거래 내역 (날짜별 그룹, 탭하면 수정)
  const all = [...S.tx].sort(sortTxDesc);
  let listHtml;
  if (!all.length) {
    listHtml = '<div class="empty">거래 내역이 없습니다</div>';
  } else {
    let html = '', curDay = '';
    all.forEach(t => {
      if (t.d !== curDay) {
        curDay = t.d;
        const [y, mo, d] = t.d.split('-').map(Number);
        const dayRows = S.tx.filter(x => x.d === t.d);
        const spent = txAmountByType(dayRows, 'expense');
        const income = txAmountByType(dayRows, 'income');
        html += `<div class="group-title" style="margin:14px 4px 4px;display:flex;justify-content:space-between;">
          <span>${y}년 ${mo}월 ${d}일</span>
          <span>${spent ? '지출 ' + fmt(spent) + '원' : ''}${spent && income ? ' · ' : ''}${income ? '수입 ' + fmt(income) + '원' : ''}</span>
        </div>`;
      }
      html += txRowHtml(t);
    });
    listHtml = html;
  }

  document.getElementById('tab-ledger').innerHTML = `
    ${renderDonut(cats, total)}
    <div class="card">
      <div class="card-title">전체 거래${all.length ? ` · ${all.length}건 (탭하면 수정)` : ''}</div>
      <div style="margin-top:4px;">${listHtml}</div>
    </div>
  `;
  document.querySelectorAll('[data-ledger-cat]').forEach(el => {
    el.addEventListener('click', () => openCategoryDetail(el.dataset.ledgerCat, MONTH));
  });
}

// ===== CALENDAR =====
function setCalendarMonth(m) {
  CAL_MONTH = m;
  const maxDay = daysInMonth(CAL_MONTH);
  const dayNum = Math.min(Number((CAL_DAY || TODAY).slice(8, 10)) || 1, maxDay);
  CAL_DAY = CAL_MONTH + '-' + _pad(dayNum);
  document.getElementById('header-sub').textContent = monthLabel(CAL_MONTH) + ' 기록';
  renderCalendar();
}
function setCalendarDay(day) {
  CAL_DAY = day;
  renderCalendar();
}

function renderCalendar() {
  const monthRows = txForMonth(CAL_MONTH);
  const spent = txAmountByType(monthRows, 'expense');
  const income = txAmountByType(monthRows, 'income');
  const invest = txAmountByType(monthRows, 'invest');
  const byDay = {};
  monthRows.forEach(t => {
    if (!byDay[t.d]) byDay[t.d] = [];
    byDay[t.d].push(t);
  });

  const [y, mo] = CAL_MONTH.split('-').map(Number);
  const first = new Date(y, mo - 1, 1).getDay();
  const totalDays = daysInMonth(CAL_MONTH);
  const heads = ['일','월','화','수','목','금','토'].map(d => `<div class="cal-head">${d}</div>`).join('');
  let cells = '';
  for (let i = 0; i < first; i++) cells += '<div class="cal-day blank"></div>';
  for (let d = 1; d <= totalDays; d++) {
    const day = CAL_MONTH + '-' + _pad(d);
    const rows = byDay[day] || [];
    const daySpent = txAmountByType(rows, 'expense');
    const cls = [
      'cal-day',
      day === TODAY ? 'today' : '',
      day === CAL_DAY ? 'selected' : ''
    ].filter(Boolean).join(' ');
    cells += `<button class="${cls}" onclick="setCalendarDay('${day}')">
      <div class="d">${d}</div>
      ${daySpent ? `<div class="sum">${fmtMan(daySpent)}</div>` : ''}
    </button>`;
  }

  const selectedRows = txForDay(CAL_DAY);
  const selectedList = selectedRows.length
    ? selectedRows.map(t => txRowHtml(t)).join('')
    : '<div class="empty">선택한 날짜의 기록이 없습니다</div>';
  const monthList = monthRows.length
    ? monthRows.sort(sortTxDesc).map(t => txRowHtml(t)).join('')
    : '<div class="empty">이 달의 기록이 없습니다</div>';

  document.getElementById('tab-calendar').innerHTML = `
    <div class="month-nav">
      <button onclick="setCalendarMonth(addMonths(CAL_MONTH, -1))">‹</button>
      <div class="month-label">${monthLabel(CAL_MONTH)}</div>
      <button onclick="setCalendarMonth(addMonths(CAL_MONTH, 1))">›</button>
    </div>

    <div class="mini-stat-grid">
      <div class="mini-stat"><div class="l">수입</div><div class="v" style="color:var(--success)">${fmtMan(income)}</div></div>
      <div class="mini-stat"><div class="l">지출</div><div class="v">${fmtMan(spent)}</div></div>
      <div class="mini-stat"><div class="l">투자</div><div class="v" style="color:var(--accent)">${fmtMan(invest)}</div></div>
    </div>

    <div class="card">
      <div class="calendar-grid">${heads}${cells}</div>
    </div>

    <div class="card">
      <div class="card-title">${CAL_DAY.replaceAll('-', '.')} 기록${selectedRows.length ? ` · ${selectedRows.length}건` : ''}</div>
      ${selectedList}
    </div>

    <div class="card">
      <div class="card-title">${monthLabel(CAL_MONTH)} 전체 기록${monthRows.length ? ` · ${monthRows.length}건` : ''}</div>
      ${monthList}
    </div>
  `;
}

// ===== BUDGET =====
function renderBudget() {
  const groups = ['고정','변동','비정기','용돈'];
  const sp = spentByCat();
  const totalBud = totalBudget();
  const savings = S.inc - totalBud;
  const rate = S.inc ? (savings / S.inc * 100).toFixed(1) : '0';

  const sections = groups.map(g => {
    const cats = S.bd.filter(b => b.g === g);
    const items = cats.map(b => `
      <div class="budget-row">
        <div>
          <div class="n">${b.n}</div>
          <div class="spent">사용 ${fmt(sp[b.id]||0)}원</div>
        </div>

    </div>

    </div>
  `;

  const incInput = document.getElementById('inc-input');
  incInput.addEventListener('input', e => {
    const raw = e.target.value.replace(/[^0-9]/g, '');
    S.inc = parseInt(raw, 10) || 0;
    e.target.value = S.inc ? S.inc.toLocaleString('ko-KR') : '';
    updateSavings();
  });
  incInput.addEventListener('blur', () => { save(); toast('저장됨'); });

  document.querySelectorAll('.budget-row input').forEach(inp => {
    inp.addEventListener('input', e => {
      const raw = e.target.value.replace(/[^0-9]/g, '');
      const v = parseInt(raw, 10) || 0;
      e.target.value = v ? v.toLocaleString('ko-KR') : '';
      const b = S.bd.find(x => x.id === inp.dataset.bid);
      if (b) b.a = v;
      updateSavings();
      const gs = document.querySelector(`[data-group-sum="${b.g}"]`);
      if (gs) {
        const sum = S.bd.filter(x => x.g === b.g).reduce((s, x) => s + x.a, 0);
        gs.textContent = `${b.g} · ${fmt(sum)}원`;
      }
    });
    inp.addEventListener('blur', () => { save(); toast('저장됨'); });
  });
}
function updateSavings() {
  const tb = totalBudget();
  const sv = S.inc - tb;
  const rate = S.inc ? (sv / S.inc * 100).toFixed(1) : '0';
  const a = document.getElementById('savings-amt');
  const r = document.getElementById('savings-rate');
  const bt = document.getElementById('budget-total');
  if (a) { a.textContent = fmt(sv) + '원'; a.style.color = sv < 0 ? 'var(--danger)' : 'var(--success)'; }
  if (r) r.textContent = rate;
  if (bt) bt.textContent = fmt(tb);
}

// ===== ASSET =====
function renderFlowChart() {
  // hist + 현재 달(라이브). 옛 항목은 nwx 없으면 nw로 대체
  const map = {};
  (S.hist || []).forEach(h => { map[h.m] = { m: h.m, nw: h.nw||0, nwx: (h.nwx != null ? h.nwx : (h.nw||0)) }; });
  map[MONTH] = { m: MONTH, nw: netWorth(true), nwx: netWorth(false) };
  const points = Object.keys(map).sort().map(k => map[k]);

  if (points.length < 2) {
    return `<div class="card">
      <div class="card-title">자산 추이</div>
      <div class="sub-num">매달 자산을 입력하면 <b>부동산 포함 / 제외</b> 두 흐름이 그래프로 쌓여요 (현재 ${points.length}개월).</div>
    </div>`;
  }

  const W = 440, H = 160, PAD_X = 16, PAD_TOP = 16, PAD_BOT = 16;
  const allVals = points.flatMap(p => [p.nw, p.nwx]);
  const minV = Math.min(...allVals), maxV = Math.max(...allVals);
  const padV = (maxV - minV) * 0.18 || 1;
  const lo = minV - padV, hi = maxV + padV;
  const range = hi - lo || 1;
  const xStep = (W - PAD_X*2) / (points.length - 1);
  const xy = (val, i) => ({ x: PAD_X + i*xStep, y: PAD_TOP + (1 - (val - lo)/range) * (H - PAD_TOP - PAD_BOT) });

  const lineFor = (key, col) => {
    const cs = points.map((p,i) => xy(p[key], i));
    const d = cs.map((c,i) => (i===0?'M':'L') + c.x.toFixed(1) + ',' + c.y.toFixed(1)).join(' ');
    const dots = cs.map((c,i) => `<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${i===cs.length-1?3.5:2}" fill="${col}"/>`).join('');
    return `<path d="${d}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
  };

  const colAll = 'var(--accent)';   // 부동산 포함 (파랑)
  const colEx  = '#ff9500';         // 부동산 제외 (주황)
  const last = points[points.length-1];
  const m = v => HIDE_NW ? '••••' : fmtMan(v);

  const axisLabels = points.map((p,i) => {
    const mNum = parseInt(p.m.split('-')[1], 10);
    const isLast = i === points.length-1;
    return `<span style="${isLast?'color:var(--text);font-weight:600;':''}">${mNum}월</span>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-title">자산 추이 (최근 ${points.length}개월)</div>
      <div style="display:flex;gap:16px;font-size:11px;margin-bottom:8px;">
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${colAll};margin-right:5px;vertical-align:0;"></span>부동산 포함 <b>${m(last.nw)}</b></span>
        <span><span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:${colEx};margin-right:5px;vertical-align:0;"></span>제외 <b>${m(last.nwx)}</b></span>
      </div>
      <svg class="chart" viewBox="0 0 ${W} ${H}">
        ${lineFor('nw', colAll)}
        ${lineFor('nwx', colEx)}
      </svg>
      <div class="chart-axis">${axisLabels}</div>
    </div>
  `;
}

  const debtSection = `
    <div class="sheet-item">
      <div class="sheet-item-head"><span class="nm">주택담보대출 (공동)</span></div>
      <div class="asset-edit-grid one">
        <label>금액<input type="text" inputmode="numeric" data-dm="1" value="${S.dt.mortgage?S.dt.mortgage.toLocaleString('ko-KR'):''}" placeholder="0"></label>
      </div>
    </div>
    ${[['credit','신용대출'],['minus','마이너스통장']].map(([k,label]) => {
      const d = S.dt[k];
      return `<div class="sheet-item">
        <div class="sheet-item-head"><span class="nm">${label}</span></div>
        <div class="asset-edit-grid">
          <label>${o1}<input type="text" inputmode="numeric" data-dk2="${k}" data-of="h" value="${d.h?d.h.toLocaleString('ko-KR'):''}" placeholder="0"></label>
          <label>${o2}<input type="text" inputmode="numeric" data-dk2="${k}" data-of="s" value="${d.s?d.s.toLocaleString('ko-KR'):''}" placeholder="0"></label>
          <label>공동<input type="text" inputmode="numeric" data-dk2="${k}" data-of="c" value="${d.c?d.c.toLocaleString('ko-KR'):''}" placeholder="0"></label>
        </div>
      </div>`;
    }).join('')}`;
  document.getElementById('sheet-title').textContent = '자산·부채 입력';
  document.getElementById('sheet-sub').textContent = '소유자별 금액(원)을 입력하세요. 자동 저장됩니다.';
  document.getElementById('sheet-body').innerHTML = rows + debtSection;

  const onNum = (el, apply) => el.addEventListener('input', e => {
    const v = parseInt(e.target.value.replace(/[^0-9]/g,''), 10) || 0;
    e.target.value = v ? v.toLocaleString('ko-KR') : '';
    apply(v); recordSnapshot(); save();
  });
  document.querySelectorAll('#sheet-body input[data-ak]').forEach(inp =>
    onNum(inp, v => { S.as[inp.dataset.ak][inp.dataset.of] = v; }));
  const mEl = document.querySelector('#sheet-body input[data-dm]');
  if (mEl) onNum(mEl, v => { S.dt.mortgage = v; });
  document.querySelectorAll('#sheet-body input[data-dk2]').forEach(inp =>
    onNum(inp, v => { S.dt[inp.dataset.dk2][inp.dataset.of] = v; }));

  document.getElementById('sheet').classList.add('show');
  document.getElementById('sheet-backdrop').classList.add('show');
}

async function resetData() {
  if (!confirm('모든 데이터를 초기 상태로 되돌릴까요? (가계부 멤버 전체에게 적용돼요)')) return;
  S = clone(DEFAULTS);
  S.tx = [];
  inputState = {t:'expense', a:0, m:'', c:'', p:''};
  await sb.from('transactions').delete().eq('household_id', HH);
  await pushSettings();
  await loadData();
  switchTab('home');
  toast('초기화되었습니다');
}

async function logout() {
  if (!confirm('로그아웃할까요?')) return;
  await sb.auth.signOut();
  location.reload();
}

const renderers = {
  home: renderHome,
  input: renderInput,
  ledger: renderLedger,
  calendar: renderCalendar,
  budget: renderBudget,
  report: renderReport,
  asset: renderAsset
};

// ===== 로그인 / 온보딩 / 부팅 =====
const $overlay   = document.getElementById('auth-overlay');
const $loginForm = document.getElementById('auth-form');
const $onbForm   = document.getElementById('onb-form');
const $sub       = document.getElementById('auth-sub');
const $err       = document.getElementById('auth-err');
const $onbErr    = document.getElementById('onb-err');

function showOverlay() { $overlay.style.display = 'flex'; }
function hideOverlay() { $overlay.style.display = 'none'; }
function showLogin(msg) {
  $sub.textContent = '구글 계정으로 로그인하세요';
  $loginForm.style.display = 'flex';
  $onbForm.style.display = 'none';
  $err.textContent = msg || '';
  showOverlay();
}
function showOnboarding(msg) {
  $sub.textContent = '가계부를 만들거나 초대코드로 참여하세요';
  $loginForm.style.display = 'none';
  $onbForm.style.display = 'flex';
  $onbErr.textContent = msg || '';
  showOverlay();
}

async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { showLogin(); return; }
  const u = session.user;
  ME = { id: u.id, email: u.email,
         name: (u.user_metadata && (u.user_metadata.full_name || u.user_metadata.name)) || null };
  await enterApp();
}

async function enterApp() {
  $sub.textContent = '불러오는 중…';
  $loginForm.style.display = 'none';
  $onbForm.style.display = 'none';
  showOverlay();
  const isMember = await loadMembership();
  if (!isMember) { showOnboarding(); return; }
  await loadData();
  subscribeRealtime();
  hideOverlay();
  switchTab('home');
}

async function loadMembership() {
  const { data: mine } = await sb.from('household_members')
    .select('household_id, role').eq('user_id', ME.id).maybeSingle();
  if (!mine) return false;
  HH = mine.household_id;
  MYROLE = mine.role;
  const [{ data: hh }, { data: mems }] = await Promise.all([
    sb.from('households').select('name').eq('id', HH).single(),
    sb.from('household_members').select('email, name, role, user_id, created_at').eq('household_id', HH).order('created_at', { ascending: true })
  ]);
  HHNAME = hh ? hh.name : '';
  MEMBERS = mems || [];
  OWNER1 = MEMBERS[0] ? (MEMBERS[0].name || nameOf(MEMBERS[0].email)) : '';
  OWNER2 = MEMBERS[1] ? (MEMBERS[1].name || nameOf(MEMBERS[1].email)) : '';
  return true;
}

document.getElementById('auth-google').addEventListener('click', async () => {
  $err.textContent = '';
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href.split('#')[0] }
  });
  if (error) $err.textContent = '로그인 실패: ' + error.message;
});

document.getElementById('onb-create').addEventListener('click', async () => {
  const name = document.getElementById('onb-name').value.trim();
  if (!name) { $onbErr.textContent = '가계부 이름을 입력하세요'; return; }
  $onbErr.textContent = '만드는 중…';
  const { error } = await sb.rpc('create_household', { p_name: name });
  if (error) { $onbErr.textContent = '실패: ' + error.message; return; }
  await enterApp();
});

document.getElementById('onb-join').addEventListener('click', async () => {
  const code = document.getElementById('onb-code').value.trim();
  if (!code) { $onbErr.textContent = '초대코드를 입력하세요'; return; }
  $onbErr.textContent = '참여 중…';
  const { error } = await sb.rpc('join_with_code', { p_code: code });
  if (error) { $onbErr.textContent = '실패: ' + error.message; return; }
  await enterApp();
});

boot();
</script>
